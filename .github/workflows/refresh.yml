name: Uppfæra gögn

on:
  schedule:
    - cron: '20 5 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # XML-skyndiminnið er geymt á milli keyrslna; fyrsta keyrslan sækir allt
      # (getur tekið nokkrar klukkustundir vegna takmarkana althingi.is)
      - uses: actions/cache@v4
        with:
          path: etl/cache
          key: althingi-xml-${{ github.run_id }}
          restore-keys: |
            althingi-xml-
      - run: python etl/scrape.py 148 157
      - run: python etl/build_db.py 148 157
      - run: python etl/export_json.py
      - id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/src/data site/public/data
          if git diff --cached --quiet; then
            echo "Engar breytingar á gögnum."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Sjálfvirk uppfærsla gagna $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: refresh
    if: needs.refresh.outputs.changed == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy.yml
